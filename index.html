<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aduu CS2 Map Veto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.box {
  max-width: 600px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #334155;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #475569;
}

.disabled {
  opacity: 0.5;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="box">

<h2>🐎 Aduu CS2 Map Veto</h2>

<div id="setup">
<input id="teamA" value="Team Ankhaa">
<input id="teamB" value="Team Bagi">

<br><br>

<select id="role">
<option value="A">Captain A</option>
<option value="B">Captain B</option>
</select>

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomCodeInput" placeholder="Room Code">
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none;">
<h3 id="title"></h3>
<p id="turn"></p>
<div id="maps"></div>
</div>

</div>

<script>

// 🔥 ЭНД СОЛИНО
const SUPABASE_URL = "https://xlpxcmycpltniajartya.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscHhjbXljcGx0bmlhamFydHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDE5MzUsImV4cCI6MjA5MDA3NzkzNX0.Cjc1Pv82fbNfVVatThYOUNcx5OXdiapIkB21DL29URk";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const mapsDefault = ["Mirage","Inferno","Nuke","Ancient","Anubis","Overpass","Vertigo"];

let room = null;
let role = null;
let channel = null;

function genCode() {
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

// CREATE ROOM
async function createRoom() {

  const code = genCode();

  role = document.getElementById("role").value;

  const { error } = await supabaseClient.from("rooms").insert([{
    room_code: code,
    team_a: document.getElementById("teamA").value,
    team_b: document.getElementById("teamB").value,
    maps: mapsDefault,
    actions: [],
    turn_index: 0
  }]);

  if(error){
    alert("error");
    console.log(error);
    return;
  }

  document.getElementById("roomCodeInput").value = code;

  loadRoom(code);
}

// JOIN
async function joinRoom(){
  const code = document.getElementById("roomCodeInput").value;
  role = document.getElementById("role").value;
  loadRoom(code);
}

// LOAD ROOM
async function loadRoom(code){

  const { data } = await supabaseClient
  .from("rooms")
  .select("*")
  .eq("room_code", code)
  .single();

  room = data;

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  render();

  channel = supabaseClient
  .channel("room")
  .on("postgres_changes",
    { event:"UPDATE", schema:"public", table:"rooms" },
    payload => {
      room = payload.new;
      render();
    }
  ).subscribe();
}

// RENDER
function render(){

  document.getElementById("title").innerText =
    room.team_a + " vs " + room.team_b;

  const turnTeam = room.turn_index % 2 === 0 ? "A" : "B";

  document.getElementById("turn").innerText =
    "Turn: " + (turnTeam === "A" ? room.team_a : room.team_b);

  const div = document.getElementById("maps");
  div.innerHTML = "";

  room.maps.forEach(m => {

    const btn = document.createElement("button");
    btn.innerText = m;

    if(role !== turnTeam){
      btn.classList.add("disabled");
    } else {
      btn.onclick = () => pick(m);
    }

    div.appendChild(btn);
  });

}

// PICK
async function pick(map){

  const newMaps = room.maps.filter(m => m !== map);

  await supabaseClient.from("rooms").update({
    maps: newMaps,
    turn_index: room.turn_index + 1
  }).eq("id", room.id);

}

</script>

</body>
</html>
