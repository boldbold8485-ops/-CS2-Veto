<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aduu CS2 Map Veto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#081225; color:white; text-align:center; margin:0; padding:20px; }
.box { max-width:1100px; margin:auto; background:#18263b; padding:20px; border-radius:16px; }

input,button,select { padding:10px; margin:5px; border-radius:10px; border:none; }
button { background:#334155; color:white; cursor:pointer; }
button:hover { background:#475569; }

.section { background:#0f172a; padding:15px; border-radius:12px; margin-top:15px; }

.room-code { font-size:32px; font-weight:bold; letter-spacing:3px; }

.map-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-top:10px; }

.map-card {
  border-radius:12px;
  overflow:hidden;
  background:#1e293b;
  cursor:pointer;
}

.map-img {
  height:90px;
  background-size:cover;
  background-position:center;
  transition:0.3s;
}

.map-card:hover .map-img { transform:scale(1.1); }

.map-name { padding:8px; }

.disabled { opacity:0.4; pointer-events:none; }

.pill { padding:6px 10px; border-radius:20px; margin:4px; display:inline-block; }
.pick { background:#1d4ed8; }
.ban { background:#7f1d1d; }
.decider { background:#065f46; }

.log { text-align:left; }
</style>
</head>

<body>

<div class="box">

<h2>🐎 Aduu CS2 Map Veto</h2>

<div id="setup">
  <input id="teamA" value="Team Ankhaa">
  <input id="teamB" value="Team Bagi"><br>

  <select id="role">
    <option value="A">Captain A</option>
    <option value="B">Captain B</option>
  </select><br>

  <button onclick="createRoom()">Create Room</button><br>

  <input id="roomCodeInput" placeholder="Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none;">

<h3 id="title"></h3>

<div class="section">
  <div class="room-code" id="roomCodeText"></div>
</div>

<div class="section">
  <input id="opponentLink" style="width:80%" readonly>
  <button onclick="copyOpponentLink()">Copy Opponent Link</button>
</div>

<div class="section">
  <h4>Coin Toss</h4>
  <div id="coinResult">Not rolled yet</div>
  <button onclick="runCoinToss()">Roll</button>
</div>

<h3 id="turn"></h3>

<div class="section">
  <div id="maps" class="map-grid"></div>
</div>

<div class="section">
  <h4>Picked</h4>
  <div id="picked"></div>

  <h4>Banned</h4>
  <div id="banned"></div>
</div>

<div class="section log">
  <h4>Log</h4>
  <div id="log"></div>
</div>

</div>

</div>

<script>

const SUPABASE_URL = "https://xlpxcmycpltniajartya.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscHhjbXljcGx0bmlhamFydHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDE5MzUsImV4cCI6MjA5MDA3NzkzNX0.Cjc1Pv82fbNfVVatThYOUNcx5OXdiapIkB21DL29URk";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const mapsDefault = ["Mirage","Inferno","Nuke","Ancient","Anubis","Overpass","Dust2"];

const mapImages = {
  Mirage:"https://liquipedia.net/commons/images/3/3e/De_mirage_cs2.jpg",
  Inferno:"https://liquipedia.net/commons/images/0/02/De_inferno_cs2.jpg",
  Nuke:"https://liquipedia.net/commons/images/5/5c/De_nuke_cs2.jpg",
  Ancient:"https://liquipedia.net/commons/images/7/79/De_ancient_cs2.jpg",
  Anubis:"https://liquipedia.net/commons/images/1/1c/De_anubis_cs2.jpg",
  Overpass:"https://liquipedia.net/commons/images/6/6d/De_overpass_cs2.jpg",
  Dust2:"https://liquipedia.net/commons/images/7/76/De_dust2_cs2.jpg"
};

const seq = ["BAN","BAN","PICK","PICK","BAN","BAN"];

let room=null;
let role=null;

function genCode(){ return Math.random().toString(36).substring(2,6).toUpperCase(); }

async function createRoom(){
  role="A";
  const code=genCode();

  await supabaseClient.from("rooms").insert([{
    room_code:code,
    team_a:teamA.value,
    team_b:teamB.value,
    maps:mapsDefault,
    actions:[],
    turn_index:0
  }]);

  loadRoom(code);
}

async function joinRoom(){
  role=document.getElementById("role").value;
  loadRoom(roomCodeInput.value);
}

async function loadRoom(code){
  const {data}=await supabaseClient.from("rooms").select("*").eq("room_code",code).single();
  room=data;

  setup.style.display="none";
  game.style.display="block";

  render();
}

function render(){

  title.innerText=room.team_a+" vs "+room.team_b;
  roomCodeText.innerText=room.room_code;

  opponentLink.value=location.href+"?room="+room.room_code+"&role=B";

  maps.innerHTML="";
  picked.innerHTML="";
  banned.innerHTML="";
  log.innerHTML="";

  room.maps.forEach(m=>{
    const div=document.createElement("div");
    div.className="map-card";

    if(role!==(room.turn_index%2===0?"A":"B")) div.classList.add("disabled");
    else div.onclick=()=>pick(m);

    div.innerHTML=`
      <div class="map-img" style="background-image:url('${mapImages[m]}')"></div>
      <div class="map-name">${m}</div>
    `;

    maps.appendChild(div);
  });

  room.actions.forEach(a=>{
    const l=document.createElement("div");
    l.innerText=a.team+" "+a.type+" "+a.map;
    log.appendChild(l);

    if(a.type==="PICK"){
      const p=document.createElement("div");
      p.className="pill pick";
      p.innerText=a.map;
      picked.appendChild(p);
    }
    if(a.type==="BAN"){
      const b=document.createElement("div");
      b.className="pill ban";
      b.innerText=a.map;
      banned.appendChild(b);
    }
  });

  if(room.maps.length===1){
    const d=document.createElement("div");
    d.className="pill decider";
    d.innerText="DECIDER "+room.maps[0];
    picked.appendChild(d);
  }

}

async function pick(map){
  const newMaps=room.maps.filter(m=>m!==map);

  const newActions=[...room.actions,{
    team:room.turn_index%2===0?room.team_a:room.team_b,
    type:seq[room.turn_index],
    map
  }];

  await supabaseClient.from("rooms").update({
    maps:newMaps,
    actions:newActions,
    turn_index:room.turn_index+1
  }).eq("id",room.id);

  loadRoom(room.room_code);
}

async function runCoinToss(){
  const winner=Math.random()<0.5?room.team_a:room.team_b;

  await supabaseClient.from("rooms").update({
    actions:[...room.actions,{
      team:winner,
      type:"COIN",
      map:"-"
    }]
  }).eq("id",room.id);

  loadRoom(room.room_code);
}

async function copyOpponentLink(){
  await navigator.clipboard.writeText(opponentLink.value);
  alert("Copied");
}

</script>

</body>
</html>
