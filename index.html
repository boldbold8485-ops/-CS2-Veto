<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aduu CS2 Map Veto</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#081225; color:white; text-align:center; margin:0; padding:20px; }
    .box { max-width:1000px; margin:auto; background:#18263b; padding:20px; border-radius:16px; }
    input, button, select { padding:10px 12px; margin:5px; border:none; border-radius:10px; font-size:15px; }
    input, select { background:white; color:#111827; }
    button { background:#334155; color:white; cursor:pointer; }
    button:hover { background:#475569; }
    .disabled { opacity:.45; pointer-events:none; }
    .section { background:#0f172a; padding:16px; border-radius:14px; margin-top:16px; }
    .room-code { font-size:34px; font-weight:700; letter-spacing:4px; }
    .locked-name { display:inline-block; background:#0b1220; padding:10px 14px; margin:5px; border-radius:10px; min-width:200px; }
    .muted { color:#94a3b8; font-size:14px; }
    .map-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:14px; }
    .map-card { border-radius:14px; overflow:hidden; background:#1e293b; border:1px solid rgba(255,255,255,.06); cursor:pointer; }
    .map-img { height:90px; background-size:cover; background-position:center; transition:.25s; }
    .map-card:hover .map-img { transform:scale(1.06); }
    .map-name { padding:10px; font-weight:700; }
    .pill { padding:7px 10px; border-radius:20px; margin:4px; display:inline-block; font-size:14px; }
    .pick { background:#1d4ed8; }
    .ban { background:#7f1d1d; }
    .decider { background:#065f46; }
    .coin { background:#854d0e; }
    .join { background:#374151; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .log { text-align:left; }
    .log-row { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    .error-box { display:none; background:#7f1d1d; color:#fff; padding:12px; border-radius:12px; margin-top:12px; text-align:left; white-space:pre-wrap; }
    @media (max-width: 800px){ .two-col { grid-template-columns:1fr; } .room-code { font-size:26px; } }
  </style>
</head>
<body>
  <div class="box">
    <h2>🐎 Aduu CS2 Map Veto</h2>

    <div id="setup">
      <input id="teamA" value="Team Ankhaa" />
      <input id="teamB" value="Team Bagi" /><br>

      <select id="role">
        <option value="A">Captain A</option>
        <option value="B">Captain B</option>
        <option value="spectator">Spectator</option>
      </select><br>

      <button id="createBtn" onclick="createRoom()">Create Room</button><br>

      <input id="roomCodeInput" placeholder="Room Code" />
      <button onclick="joinRoom()">Join Room</button>

      <div id="errorBox" class="error-box"></div>
    </div>

    <div id="game" style="display:none;">
      <h3 id="title"></h3>

      <div class="section">
        <h4>Teams</h4>
        <div>
          <span id="teamAName" class="locked-name"></span>
          <span id="teamBName" class="locked-name"></span>
        </div>
      </div>

      <div class="section">
        <div class="room-code" id="roomCodeText"></div>
      </div>

      <div class="section">
        <h4>Opponent Link</h4>
        <div class="muted">Нөгөө ахлагчид энэ link-ийг явуулна</div>
        <input id="opponentLink" style="width:80%" readonly /><br>
        <button onclick="copyOpponentLink()">Copy Opponent Link</button>
      </div>

      <div class="section">
        <h4>Coin Toss</h4>
        <div id="coinResult">Not rolled yet</div>
        <button onclick="runCoinToss()">Roll Coin Toss</button>
        <div class="muted" style="margin-top:8px;">Coin toss-д хожигдсон баг эхний BAN хийнэ</div>
      </div>

      <h3 id="turn"></h3>

      <div class="section">
        <h4>Available Maps</h4>
        <div id="maps" class="map-grid"></div>
      </div>

      <div class="two-col">
        <div class="section">
          <h4>Picked</h4>
          <div id="picked"></div>
        </div>
        <div class="section">
          <h4>Banned</h4>
          <div id="banned"></div>
        </div>
      </div>

      <div class="section">
        <h4>Final Decider</h4>
        <div id="finalMap">-</div>
      </div>

      <div class="section log">
        <h4>Log</h4>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xlpxcmycpltniajartya.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscHhjbXljcGx0bmlhamFydHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDE5MzUsImV4cCI6MjA5MDA3NzkzNX0.Cjc1Pv82fbNfVVatThYOUNcx5OXdiapIkB21DL29URk";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const mapsDefault = ["Mirage","Inferno","Nuke","Ancient","Anubis","Overpass","Dust2"];

    const mapImages = {
      Mirage: "/images/mirage.jpg",
      Inferno: "/images/inferno.jpg",
      Nuke: "/images/nuke.jpg",
      Ancient: "/images/ancient.jpg",
      Anubis: "/images/anubis.jpg",
      Overpass: "/images/overpass.jpg",
      Dust2: "/images/dust2.jpg"
    };

    const seq = ["BAN","BAN","PICK","PICK","BAN","BAN"];

    let room = null;
    let role = null;
    let channel = null;

    function showError(err) {
      const box = document.getElementById("errorBox");
      const msg = typeof err === "string" ? err : (err?.message || JSON.stringify(err, null, 2));
      box.style.display = "block";
      box.innerText = msg;
      console.error(err);
    }

    function clearError() {
      const box = document.getElementById("errorBox");
      box.style.display = "none";
      box.innerText = "";
    }

    function genCode() {
      return Math.random().toString(36).substring(2,6).toUpperCase();
    }

    function getCoinTossAction() {
      if (!room || !Array.isArray(room.actions)) return null;
      return room.actions.find(a => a.type === "COIN TOSS") || null;
    }

    function getStartingTeamKey() {
      const toss = getCoinTossAction();
      if (toss) {
        if (toss.team === room.team_a) return "B";
        if (toss.team === room.team_b) return "A";
      }
      return "A";
    }

    function getCurrentTurnTeamKey() {
      const startTeam = getStartingTeamKey();
      return room.turn_index % 2 === 0 ? startTeam : (startTeam === "A" ? "B" : "A");
    }

    function canPlayNow() {
      if (!room) return false;
      if (room.maps.length === 1) return false;
      const toss = getCoinTossAction();
      if (!toss) return false;
      return role === getCurrentTurnTeamKey();
    }

    function normalizeRoom(data) {
      return {
        ...data,
        maps: Array.isArray(data.maps) ? data.maps : [],
        actions: Array.isArray(data.actions) ? data.actions : []
      };
    }

    async function createRoom() {
      clearError();
      try {
        role = "A";
        document.getElementById("role").value = "A";

        const code = genCode();
        const teamAValue = document.getElementById("teamA").value.trim() || "Team Ankhaa";
        const teamBValue = document.getElementById("teamB").value.trim() || "Team Bagi";

        const { error } = await supabaseClient.from("rooms").insert([{
          room_code: code,
          team_a: teamAValue,
          team_b: teamBValue,
          maps: mapsDefault,
          actions: [],
          turn_index: 0
        }]);

        if (error) throw error;

        document.getElementById("roomCodeInput").value = code;
        await loadRoom(code);
        await addJoinLogIfNeeded();
      } catch (err) {
        showError(err);
      }
    }

    async function joinRoom() {
      clearError();
      try {
        role = document.getElementById("role").value;
        const code = document.getElementById("roomCodeInput").value.trim().toUpperCase();
        if (!code) throw new Error("Room code оруулна уу");
        await loadRoom(code);
        await addJoinLogIfNeeded();
      } catch (err) {
        showError(err);
      }
    }

    async function autoJoinFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get("room");
      const roleParam = params.get("role");

      if (!roomParam) return;

      document.getElementById("roomCodeInput").value = roomParam.toUpperCase();

      if (roleParam === "A" || roleParam === "B" || roleParam === "spectator") {
        document.getElementById("role").value = roleParam;
        role = roleParam;
      }

      await joinRoom();
    }

    async function addJoinLogIfNeeded() {
      if (!room || !role) return;

      const alreadyJoined = room.actions.some(a => a.type === "JOIN" && a.role === role);
      if (alreadyJoined) return;

      const teamName = role === "A" ? room.team_a : role === "B" ? room.team_b : "Spectator";

      const newActions = [...room.actions, {
        team: teamName,
        type: "JOIN",
        role: role,
        map: "-"
      }];

      const { error } = await supabaseClient.from("rooms").update({
        actions: newActions
      }).eq("id", room.id);

      if (error) throw error;
    }

    async function loadRoom(code) {
      const { data, error } = await supabaseClient
        .from("rooms")
        .select("*")
        .eq("room_code", code.toUpperCase())
        .single();

      if (error || !data) throw error || new Error("Room not found");

      room = normalizeRoom(data);

      document.getElementById("setup").style.display = "none";
      document.getElementById("game").style.display = "block";

      render();

      if (channel) {
        await supabaseClient.removeChannel(channel);
      }

      channel = supabaseClient
        .channel("room-" + room.room_code)
        .on(
          "postgres_changes",
          {
            event: "UPDATE",
            schema: "public",
            table: "rooms",
            filter: `room_code=eq.${room.room_code}`
          },
          payload => {
            room = normalizeRoom(payload.new);
            render();
          }
        )
        .subscribe();
    }

    function render() {
      document.getElementById("title").innerText = room.team_a + " vs " + room.team_b;
      document.getElementById("roomCodeText").innerText = room.room_code;

      const joinedA = room.actions.some(a => a.type === "JOIN" && a.role === "A");
      const joinedB = room.actions.some(a => a.type === "JOIN" && a.role === "B");

      document.getElementById("teamAName").innerText = room.team_a + (joinedA ? " ✅" : " ❌");
      document.getElementById("teamBName").innerText = room.team_b + (joinedB ? " ✅" : " ❌");

      const base = location.origin + location.pathname;
      let opponentRole = "B";
      if (role === "B") opponentRole = "A";
      if (role === "spectator") opponentRole = "B";

      document.getElementById("opponentLink").value = `${base}?room=${room.room_code}&role=${opponentRole}`;

      const toss = getCoinTossAction();
      const currentTurnTeamKey = getCurrentTurnTeamKey();
      const currentTurnName = currentTurnTeamKey === "A" ? room.team_a : room.team_b;

      if (!toss) {
        document.getElementById("turn").innerText = "Эхлээд Coin Toss хийнэ";
      } else if (room.maps.length === 1) {
        document.getElementById("turn").innerText = "Veto complete";
      } else {
        document.getElementById("turn").innerText = "Turn: " + currentTurnName + " " + (seq[room.turn_index] || "");
      }

      const mapsEl = document.getElementById("maps");
      const pickedEl = document.getElementById("picked");
      const bannedEl = document.getElementById("banned");
      const logEl = document.getElementById("log");
      const coinResultEl = document.getElementById("coinResult");
      const finalMapEl = document.getElementById("finalMap");

      mapsEl.innerHTML = "";
      pickedEl.innerHTML = "";
      bannedEl.innerHTML = "";
      logEl.innerHTML = "";
      coinResultEl.innerText = "Not rolled yet";
      finalMapEl.innerText = room.maps.length === 1 ? room.maps[0] : "-";

      room.maps.forEach(m => {
        const card = document.createElement("div");
        card.className = "map-card";
        if (!canPlayNow()) card.classList.add("disabled");
        else card.onclick = () => pick(m);

        card.innerHTML = `
          <div class="map-img" style="background-image:url('${mapImages[m] || ""}'); background-color:#1e293b;"></div>
          <div class="map-name">${m}</div>
        `;
        mapsEl.appendChild(card);
      });

      room.actions.forEach(a => {
        if (a.type === "COIN TOSS") {
          const loser = a.team === room.team_a ? room.team_b : room.team_a;
          coinResultEl.innerText = a.team + " won the coin toss. " + loser + " starts first BAN.";

          const coinPill = document.createElement("div");
          coinPill.className = "pill coin";
          coinPill.innerText = a.team + " won coin toss";
          pickedEl.appendChild(coinPill);
        }

        const row = document.createElement("div");
        row.className = "log-row";
        row.innerText = a.type === "JOIN" ? (a.team + " joined the room") : (a.team + " " + a.type + " " + a.map);
        logEl.appendChild(row);

        if (a.type === "JOIN" || a.type === "COIN TOSS") return;

        const pill = document.createElement("div");
        pill.className = "pill " + (a.type === "PICK" ? "pick" : "ban");
        pill.innerText = a.map + " - " + a.team;

        if (a.type === "PICK") pickedEl.appendChild(pill);
        else bannedEl.appendChild(pill);
      });

      if (room.maps.length === 1) {
        const dec = document.createElement("div");
        dec.className = "pill decider";
        dec.innerText = "DECIDER " + room.maps[0];
        pickedEl.appendChild(dec);
      }
    }

    async function pick(map) {
      try {
        const toss = getCoinTossAction();
        if (!toss) throw new Error("Эхлээд coin toss хийнэ");

        const actingTeamKey = getCurrentTurnTeamKey();
        const actingTeamName = actingTeamKey === "A" ? room.team_a : room.team_b;

        const newMaps = room.maps.filter(m => m !== map);
        const newActions = [...room.actions, {
          team: actingTeamName,
          type: seq[room.turn_index],
          map
        }];

        const { error } = await supabaseClient.from("rooms").update({
          maps: newMaps,
          actions: newActions,
          turn_index: room.turn_index + 1
        }).eq("id", room.id);

        if (error) throw error;
      } catch (err) {
        showError(err);
      }
    }

    async function runCoinToss() {
      try {
        if (!room) return;
        if (room.actions.some(a => a.type === "COIN TOSS")) return;

        const winner = Math.random() < 0.5 ? room.team_a : room.team_b;
        const newActions = [...room.actions, {
          team: winner,
          type: "COIN TOSS",
          map: "-"
        }];

        const { error } = await supabaseClient.from("rooms").update({
          actions: newActions
        }).eq("id", room.id);

        if (error) throw error;
      } catch (err) {
        showError(err);
      }
    }

    async function copyCode() {
      await navigator.clipboard.writeText(room.room_code);
    }

    async function copyOpponentLink() {
      await navigator.clipboard.writeText(document.getElementById("opponentLink").value);
    }

    window.onload = async () => {
      await autoJoinFromUrl();
    };
  </script>
</body>
</html>
