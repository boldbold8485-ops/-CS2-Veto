<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aduu CS2 Map Veto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#081225; color:white; text-align:center; }
.box { max-width:900px; margin:auto; background:#18263b; padding:20px; border-radius:16px; }

input, button, select {
  padding:10px; margin:5px; border-radius:8px; border:none;
}

button { background:#334155; color:white; cursor:pointer; }
button:hover { background:#475569; }

.disabled { opacity:0.4; pointer-events:none; }

.room-code { font-size:32px; font-weight:bold; letter-spacing:3px; }

.map-list { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:10px; }

.section { background:#0f172a; padding:15px; border-radius:12px; margin-top:15px; }

.log { text-align:left; }

.pill { padding:6px 10px; border-radius:20px; margin:3px; display:inline-block; }
.pick { background:#1d4ed8; }
.ban { background:#7f1d1d; }
.decider { background:#065f46; }
.coin { background:#854d0e; }
</style>
</head>

<body>

<div class="box">

<h2>🐎 Aduu CS2 Map Veto</h2>

<div id="setup">
<input id="teamA" value="Team Ankhaa">
<input id="teamB" value="Team Bagi"><br>

<select id="role">
<option value="A">А багийн ахлагч</option>
<option value="B">Б багийн ахлагч</option>
<option value="spectator">Spectator</option>
</select><br>

<button onclick="createRoom()">Create Room</button><br>

<input id="roomCodeInput" placeholder="Room Code">
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none;">

<h3 id="title"></h3>

<div class="section">
<div class="room-code" id="roomCodeText"></div>
<button onclick="copyCode()">Copy Code</button>
</div>

<div class="section">
<h4>Links</h4>
<input id="linkA" style="width:80%" readonly><br>
<button onclick="copyA()">Copy А багийн ахлагч Link</button><br>

<input id="linkB" style="width:80%" readonly><br>
<button onclick="copyB()">Copy Б багийн ахлагч Link</button>
</div>

<div class="section">
<h4>Coin Toss</h4>
<div id="coinResult">Not rolled yet</div>
<button onclick="runCoinToss()">Roll Coin Toss</button>
</div>

<h3 id="turn"></h3>

<div id="maps" class="map-list"></div>

<div class="section">
<h4>Picked</h4>
<div id="picked"></div>

<h4>Banned</h4>
<div id="banned"></div>
</div>

<div class="section log">
<h4>Log</h4>
<div id="log"></div>
</div>

</div>

</div>

<script>

const SUPABASE_URL = "https://xlpxcmycpltniajartya.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_PUBLIC_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const mapsDefault = ["Mirage","Inferno","Nuke","Ancient","Anubis","Overpass","Dust2"];
const seq = ["BAN","BAN","PICK","PICK","BAN","BAN"];

let room = null;
let role = null;
let channel = null;

function genCode(){ 
  return Math.random().toString(36).substring(2,6).toUpperCase(); 
}

async function createRoom(){
  const code = genCode();
  role = document.getElementById("role").value;

  const {error} = await supabaseClient.from("rooms").insert([{
    room_code: code,
    team_a: teamA.value,
    team_b: teamB.value,
    maps: mapsDefault,
    actions: [],
    turn_index: 0
  }]);

  if(error){ 
    alert("error"); 
    console.log(error); 
    return; 
  }

  roomCodeInput.value = code;
  loadRoom(code);
}

async function joinRoom(){
  role = document.getElementById("role").value;
  loadRoom(roomCodeInput.value);
}

async function loadRoom(code){
  const {data, error} = await supabaseClient
    .from("rooms")
    .select("*")
    .eq("room_code", code.toUpperCase())
    .single();

  if(error || !data){
    alert("Room not found");
    console.log(error);
    return;
  }

  room = normalizeRoom(data);

  setup.style.display="none";
  game.style.display="block";

  render();

  if(channel){
    await supabaseClient.removeChannel(channel);
  }

  channel = supabaseClient
    .channel("room-" + room.room_code)
    .on(
      "postgres_changes",
      {
        event:"UPDATE",
        schema:"public",
        table:"rooms",
        filter:`room_code=eq.${room.room_code}`
      },
      payload => {
        room = normalizeRoom(payload.new);
        render();
      }
    )
    .subscribe();
}

function normalizeRoom(data){
  return {
    ...data,
    maps: Array.isArray(data.maps) ? data.maps : [],
    actions: Array.isArray(data.actions) ? data.actions : []
  };
}

function render(){

  title.innerText = room.team_a + " vs " + room.team_b;
  roomCodeText.innerText = room.room_code;

  const base = location.origin + location.pathname;

  linkA.value = base + "?room=" + room.room_code + "&role=A";
  linkB.value = base + "?room=" + room.room_code + "&role=B";

  const turnTeam = room.turn_index % 2 === 0 ? "A":"B";
  turn.innerText = room.maps.length === 1
    ? "Veto complete"
    : "Turn: " + (turnTeam==="A" ? room.team_a : room.team_b) + " " + (seq[room.turn_index] || "");

  maps.innerHTML="";
  picked.innerHTML="";
  banned.innerHTML="";
  log.innerHTML="";
  coinResult.innerText = "Not rolled yet";

  room.maps.forEach(m=>{
    const btn = document.createElement("button");
    btn.innerText = m;

    if(role!==turnTeam || room.maps.length===1) btn.classList.add("disabled");
    else btn.onclick = ()=>pick(m);

    maps.appendChild(btn);
  });

  room.actions.forEach(a=>{
    if(a.type === "COIN TOSS"){
      coinResult.innerText = a.team + " won the coin toss";

      const coinPill = document.createElement("div");
      coinPill.className = "pill coin";
      coinPill.innerText = a.team + " won coin toss";
      picked.appendChild(coinPill);
    }

    const div=document.createElement("div");
    div.innerText=a.team+" "+a.type+" "+a.map;
    log.appendChild(div);

    if(a.type === "PICK" || a.type === "BAN"){
      const pill=document.createElement("div");
      pill.className="pill "+(a.type==="PICK"?"pick":"ban");
      pill.innerText=a.map + " - " + a.team;

      if(a.type==="PICK") picked.appendChild(pill);
      else banned.appendChild(pill);
    }
  });

  if(room.maps.length===1){
    const d=document.createElement("div");
    d.className="pill decider";
    d.innerText="DECIDER " + room.maps[0];
    picked.appendChild(d);
  }
}

async function pick(map){
  const newMaps = room.maps.filter(m=>m!==map);
  const newActions = [...room.actions,{
    team: (room.turn_index%2===0 ? room.team_a : room.team_b),
    type: seq[room.turn_index],
    map
  }];

  const {error} = await supabaseClient.from("rooms").update({
    maps:newMaps,
    actions:newActions,
    turn_index:room.turn_index+1
  }).eq("id",room.id);

  if(error){
    alert("Update error");
    console.log(error);
  }
}

async function runCoinToss(){
  if(!room) return;

  if(room.actions.some(a => a.type === "COIN TOSS")){
    alert("Coin toss already done");
    return;
  }

  const winner = Math.random() < 0.5 ? room.team_a : room.team_b;

  const newActions = [...room.actions, {
    team: winner,
    type: "COIN TOSS",
    map: "-"
  }];

  const {error} = await supabaseClient.from("rooms").update({
    actions: newActions
  }).eq("id", room.id);

  if(error){
    alert("Coin toss error");
    console.log(error);
  }
}

async function copyCode(){ 
  try {
    await navigator.clipboard.writeText(room.room_code);
    alert("Code copied");
  } catch {
    alert("Copy failed");
  }
}

async function copyA(){ 
  try {
    await navigator.clipboard.writeText(linkA.value);
    alert("Captain A link copied");
  } catch {
    alert("Copy failed");
  }
}

async function copyB(){ 
  try {
    await navigator.clipboard.writeText(linkB.value);
    alert("Captain B link copied");
  } catch {
    alert("Copy failed");
  }
}

window.onload = async ()=>{
  const p = new URLSearchParams(location.search);
  const roomParam = p.get("room");
  const roleParam = p.get("role");

  if(roomParam){
    roomCodeInput.value = roomParam.toUpperCase();

    if(roleParam === "A" || roleParam === "B" || roleParam === "spectator"){
      document.getElementById("role").value = roleParam;
      role = roleParam;
    }

    await joinRoom();
  }
};

</script>

</body>
</html>
