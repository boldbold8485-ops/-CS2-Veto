<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aduu CS2 Map Veto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#081225; color:white; text-align:center; }
.box { max-width:900px; margin:auto; background:#18263b; padding:20px; border-radius:16px; }

input, button, select {
  padding:10px; margin:5px; border-radius:8px; border:none;
}

button { background:#334155; color:white; cursor:pointer; }
button:hover { background:#475569; }

.disabled { opacity:0.4; pointer-events:none; }

.room-code { font-size:32px; font-weight:bold; letter-spacing:3px; }

.map-list { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:10px; }

.section { background:#0f172a; padding:15px; border-radius:12px; margin-top:15px; }

.log { text-align:left; }

.pill { padding:6px 10px; border-radius:20px; margin:3px; display:inline-block; }
.pick { background:#1d4ed8; }
.ban { background:#7f1d1d; }
.decider { background:#065f46; }
.coin { background:#854d0e; }

.locked-name {
  display:inline-block;
  background:#0b1220;
  padding:10px 14px;
  margin:5px;
  border-radius:8px;
  min-width:180px;
}
</style>
</head>

<body>

<div class="box">

<h2>🐎 Aduu CS2 Map Veto</h2>

<div id="setup">
  <input id="teamA" value="Team Ankhaa">
  <input id="teamB" value="Team Bagi"><br>

  <select id="role">
    <option value="A">Captain A</option>
    <option value="B">Captain B</option>
    <option value="spectator">Spectator</option>
  </select><br>

  <button onclick="createRoom()">Create Room</button><br>

  <input id="roomCodeInput" placeholder="Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none;">

  <h3 id="title"></h3>

  <div class="section">
    <h4>Teams</h4>
    <div>
      <span id="teamAName" class="locked-name"></span>
      <span id="teamBName" class="locked-name"></span>
    </div>
  </div>

  <div class="section">
    <div class="room-code" id="roomCodeText"></div>
    <button onclick="copyCode()">Copy Code</button>
  </div>

  <div class="section">
    <h4>Opponent Link</h4>
    <div style="margin-bottom:8px;">B багийн ахлагчид энэ link-ийг явуулна</div>
    <input id="opponentLink" style="width:80%" readonly><br>
    <button onclick="copyOpponentLink()">Copy Opponent Link</button>
  </div>

  <div class="section">
    <h4>Coin Toss</h4>
    <div id="coinResult">Not rolled yet</div>
    <button onclick="runCoinToss()">Roll Coin Toss</button>
    <div style="margin-top:8px; opacity:0.8; font-size:14px;">
      Coin toss-д хожигдсон баг эхний BAN хийнэ
    </div>
  </div>

  <h3 id="turn"></h3>

  <div id="maps" class="map-list"></div>

  <div class="section">
    <h4>Picked</h4>
    <div id="picked"></div>

    <h4>Banned</h4>
    <div id="banned"></div>
  </div>

  <div class="section log">
    <h4>Log</h4>
    <div id="log"></div>
  </div>

</div>

</div>

<script>
const SUPABASE_URL = "https://xlpxcmycpltniajartya.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscHhjbXljcGx0bmlhamFydHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDE5MzUsImV4cCI6MjA5MDA3NzkzNX0.Cjc1Pv82fbNfVVatThYOUNcx5OXdiapIkB21DL29URk
  ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const mapsDefault = ["Mirage","Inferno","Nuke","Ancient","Anubis","Overpass","Vertigo"];
const seq = ["BAN","BAN","PICK","PICK","BAN","BAN"];

let room = null;
let role = null;
let channel = null;

function genCode(){
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

function getCoinTossAction() {
  if (!room || !Array.isArray(room.actions)) return null;
  return room.actions.find(a => a.type === "COIN TOSS") || null;
}

function getStartingTeamKey() {
  const toss = getCoinTossAction();

  // Coin toss winner = toss.team
  // Loser starts first BAN
  if (toss) {
    if (toss.team === room.team_a) return "B";
    if (toss.team === room.team_b) return "A";
  }

  // coin toss хийгдээгүй бол default A
  return "A";
}

function getCurrentTurnTeamKey() {
  const startTeam = getStartingTeamKey();
  return room.turn_index % 2 === 0
    ? startTeam
    : (startTeam === "A" ? "B" : "A");
}

function canPlayNow() {
  if (!room) return false;
  if (room.maps.length === 1) return false;

  const toss = getCoinTossAction();
  if (!toss) return false;

  return role === getCurrentTurnTeamKey();
}

async function createRoom(){
  const code = genCode();
  role = "A";
  document.getElementById("role").value = "A";

  const teamAValue = document.getElementById("teamA").value.trim() || "Team Ankhaa";
  const teamBValue = document.getElementById("teamB").value.trim() || "Team Bagi";

  const { error } = await supabaseClient.from("rooms").insert([{
    room_code: code,
    team_a: teamAValue,
    team_b: teamBValue,
    maps: mapsDefault,
    actions: [],
    turn_index: 0
  }]);

  if (error) {
    alert("Room create error");
    console.log(error);
    return;
  }

  document.getElementById("roomCodeInput").value = code;
  await loadRoom(code);
}

async function joinRoom(){
  role = document.getElementById("role").value;

  const code = document.getElementById("roomCodeInput").value.trim().toUpperCase();
  if (!code) {
    alert("Room code оруулна уу");
    return;
  }

  await loadRoom(code);
}

async function loadRoom(code){
  const { data, error } = await supabaseClient
    .from("rooms")
    .select("*")
    .eq("room_code", code.toUpperCase())
    .single();

  if (error || !data) {
    alert("Room not found");
    console.log(error);
    return;
  }

  room = normalizeRoom(data);

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  render();

  if (channel) {
    await supabaseClient.removeChannel(channel);
  }

  channel = supabaseClient
    .channel("room-" + room.room_code)
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "rooms",
        filter: `room_code=eq.${room.room_code}`
      },
      payload => {
        room = normalizeRoom(payload.new);
        render();
      }
    )
    .subscribe();
}

function normalizeRoom(data){
  return {
    ...data,
    maps: Array.isArray(data.maps) ? data.maps : [],
    actions: Array.isArray(data.actions) ? data.actions : []
  };
}

function render(){
  document.getElementById("title").innerText = room.team_a + " vs " + room.team_b;
  document.getElementById("roomCodeText").innerText = room.room_code;
  document.getElementById("teamAName").innerText = room.team_a;
  document.getElementById("teamBName").innerText = room.team_b;

  const base = location.origin + location.pathname;

  let opponentRole = "B";
  if (role === "B") opponentRole = "A";
  if (role === "spectator") opponentRole = "B";

  document.getElementById("opponentLink").value =
    base + "?room=" + room.room_code + "&role=" + opponentRole;

  const toss = getCoinTossAction();
  const currentTurnTeamKey = getCurrentTurnTeamKey();
  const currentTurnName = currentTurnTeamKey === "A" ? room.team_a : room.team_b;

  if (!toss) {
    document.getElementById("turn").innerText = "Эхлээд Coin Toss хийнэ";
  } else if (room.maps.length === 1) {
    document.getElementById("turn").innerText = "Veto complete";
  } else {
    document.getElementById("turn").innerText =
      "Turn: " + currentTurnName + " " + (seq[room.turn_index] || "");
  }

  maps.innerHTML = "";
  picked.innerHTML = "";
  banned.innerHTML = "";
  log.innerHTML = "";
  coinResult.innerText = "Not rolled yet";

  room.maps.forEach(m => {
    const btn = document.createElement("button");
    btn.innerText = m;

    if (!canPlayNow()) {
      btn.classList.add("disabled");
    } else {
      btn.onclick = () => pick(m);
    }

    maps.appendChild(btn);
  });

  room.actions.forEach(a => {
    if (a.type === "COIN TOSS") {
      const loser = a.team === room.team_a ? room.team_b : room.team_a;
      coinResult.innerText = a.team + " won the coin toss. " + loser + " starts first BAN.";

      const coinPill = document.createElement("div");
      coinPill.className = "pill coin";
      coinPill.innerText = a.team + " won coin toss";
      picked.appendChild(coinPill);
    }

    const div = document.createElement("div");
    div.innerText = a.team + " " + a.type + " " + a.map;
    log.appendChild(div);

    if (a.type === "PICK" || a.type === "BAN") {
      const pill = document.createElement("div");
      pill.className = "pill " + (a.type === "PICK" ? "pick" : "ban");
      pill.innerText = a.map + " - " + a.team;

      if (a.type === "PICK") picked.appendChild(pill);
      else banned.appendChild(pill);
    }
  });

  if (room.maps.length === 1) {
    const d = document.createElement("div");
    d.className = "pill decider";
    d.innerText = "DECIDER " + room.maps[0];
    picked.appendChild(d);
  }
}

async function pick(map){
  const toss = getCoinTossAction();
  if (!toss) {
    alert("Эхлээд coin toss хийнэ");
    return;
  }

  const actingTeamKey = getCurrentTurnTeamKey();
  const actingTeamName = actingTeamKey === "A" ? room.team_a : room.team_b;

  const newMaps = room.maps.filter(m => m !== map);
  const newActions = [...room.actions, {
    team: actingTeamName,
    type: seq[room.turn_index],
    map
  }];

  const { error } = await supabaseClient.from("rooms").update({
    maps: newMaps,
    actions: newActions,
    turn_index: room.turn_index + 1
  }).eq("id", room.id);

  if (error) {
    alert("Update error");
    console.log(error);
  }
}

async function runCoinToss(){
  if (!room) return;

  if (room.actions.some(a => a.type === "COIN TOSS")) {
    alert("Coin toss already done");
    return;
  }

  const winner = Math.random() < 0.5 ? room.team_a : room.team_b;

  const newActions = [...room.actions, {
    team: winner,
    type: "COIN TOSS",
    map: "-"
  }];

  const { error } = await supabaseClient.from("rooms").update({
    actions: newActions
  }).eq("id", room.id);

  if (error) {
    alert("Coin toss error");
    console.log(error);
  }
}

async function copyCode(){
  try {
    await navigator.clipboard.writeText(room.room_code);
    alert("Code copied");
  } catch {
    alert("Copy failed");
  }
}

async function copyOpponentLink(){
  try {
    await navigator.clipboard.writeText(document.getElementById("opponentLink").value);
    alert("Opponent link copied");
  } catch {
    alert("Copy failed");
  }
}

window.onload = async () => {
  const p = new URLSearchParams(location.search);
  const roomParam = p.get("room");
  const roleParam = p.get("role");

  if (roomParam) {
    roomCodeInput.value = roomParam.toUpperCase();

    if (roleParam === "A" || roleParam === "B" || roleParam === "spectator") {
      document.getElementById("role").value = roleParam;
      role = roleParam;
    }

    await joinRoom();
  }
};
</script>

</body>
</html>
